server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 20M;

  # ^~ stops nginx from also checking the regex location below for static
  # extensions (.png/.jpg/...) — without it, a path like
  # /api/uploads/avatars/foo.png matches that regex instead of this prefix
  # and nginx tries to serve it from its own webroot (404, never reaches
  # the backend).
  # OCR photo processing runs through the backend (auth + institution checks)
  # and can take a while for vision model inference — longer timeout, matched
  # before the generic /api/ block since it's a more specific prefix.
  location ^~ /api/ocr/ {
    proxy_pass http://backend:3000/api/ocr/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 1800s;
    proxy_connect_timeout 30s;
    client_max_body_size 20M;
  }

  location ^~ /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
  }

  location /ngsw.json {
    add_header Cache-Control "no-cache";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
