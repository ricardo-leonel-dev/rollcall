services:

  # ─────────────────────────────────────────
  # TAILSCALE — acceso remoto seguro
  # ─────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: ai-rig
    network_mode: host
    privileged: true
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true

  # ─────────────────────────────────────────
  # POSTGRESQL — base de datos principal
  # NOTA: Si ya existe volumen postgres_data de instalación anterior,
  # ejecutar: docker volume rm ai-personal_postgres_data
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./postgres/02_auth_schema.sql:/docker-entrypoint-initdb.d/02_auth_schema.sql
      - ./postgres/03_multi_tenant.sql:/docker-entrypoint-initdb.d/03_multi_tenant.sql
      - ./postgres/04_user_avatar.sql:/docker-entrypoint-initdb.d/04_user_avatar.sql
      - ./postgres/05_course_scope.sql:/docker-entrypoint-initdb.d/05_course_scope.sql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ─────────────────────────────────────────
  # OCR SERVICE — Python 3.11 + FastAPI
  # Procesa fotos de listas manuscritas via llama-server (rig remoto)
  # ─────────────────────────────────────────
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
      - VLLM_URL=${LLM_URL}
      - VISION_MODEL=${VISION_MODEL}
      - AI_API_KEY=${LLM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # EXCEL-SERVICE — Go
  # Export de reportes a la plantilla .xlsx + import de nómina (en progreso)
  # ─────────────────────────────────────────
  excel-service:
    build:
      context: ./excel-service
      dockerfile: Dockerfile
    container_name: excel-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./agente-ocr/plantilla_asistencia.xlsx:/app/plantilla_asistencia.xlsx:ro
      - excel_output:/app/output
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # REDIS — cola de jobs para procesamiento de voz
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # BACKEND — Node.js 22 + Express 5 + TypeScript
  # API REST principal
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - avatars_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - OCR_SERVICE_URL=http://ocr-service:8001
      - EXCEL_SERVICE_URL=http://excel-service:8002
      - WHISPER_URL=${WHISPER_URL}
      - LLM_URL=${LLM_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - REDIS_URL=redis://redis:6379
      - BULL_BOARD_USER=${BULL_BOARD_USER}
      - BULL_BOARD_PASS=${BULL_BOARD_PASS}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # FRONTEND — Angular 22 + PWA servido por Nginx
  # Proxy: /api/* → backend (incluye /api/ocr/* → backend → ocr-service)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tailscale_data:
  postgres_data:
  redis_data:
  excel_output:
  avatars_data:

networks:
  default:
    name: ai-stack
