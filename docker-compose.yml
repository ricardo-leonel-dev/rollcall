services:

  # ─────────────────────────────────────────
  # TAILSCALE — acceso remoto seguro
  # ─────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: ai-rig
    network_mode: host
    privileged: true
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true

  # ─────────────────────────────────────────
  # POSTGRESQL — base de datos principal
  # NOTA: Si ya existe volumen postgres_data de instalación anterior,
  # ejecutar: docker volume rm ai-personal_postgres_data
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./postgres/02_auth_schema.sql:/docker-entrypoint-initdb.d/02_auth_schema.sql
      - ./postgres/03_multi_tenant.sql:/docker-entrypoint-initdb.d/03_multi_tenant.sql
      - ./postgres/04_user_avatar.sql:/docker-entrypoint-initdb.d/04_user_avatar.sql
      - ./postgres/05_course_scope.sql:/docker-entrypoint-initdb.d/05_course_scope.sql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ─────────────────────────────────────────
  # OLLAMA-CHAT — GPU 0 — chat familiar
  # ─────────────────────────────────────────
  ollama-chat:
    image: ollama/ollama:latest
    container_name: ollama-chat
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_chat_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=-1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  # ─────────────────────────────────────────
  # VLLM-VISION — GPU 1 (GPU 0 y 2 libres por ahora)
  # Qwen2.5-VL-3B-AWQ: checkpoint en disco 3.17 GiB, ~1.7 GiB ya cargado en VRAM.
  # Probado con tensor-parallel-size=2 (GPU 1+2): NO ayudó. La VRAM nunca fue
  # el cuello de botella (sobra en 1 sola GPU de 6GB) — el cuello de botella
  # es la RAM del host (7.2GB) al leer el checkpoint de disco. Con 2 GPUs hay
  # 2 procesos leyendo el checkpoint completo en paralelo, duplicando la
  # presión sobre esa misma RAM escasa: el host terminó haciendo swap pesado
  # (3.6/4GB) y uno de los dos workers nunca terminó de cargar, quedando
  # colgado en un deadlock de sincronización entre procesos (shm_broadcast).
  # Con 1 GPU un solo proceso carga el checkpoint (lento por poca RAM
  # disponible para cachear el archivo, ~107s, pero sin competir consigo
  # mismo) y termina sin colgarse.
  # ─────────────────────────────────────────
  vllm-vision:
    image: vllm/vllm-openai:latest
    container_name: vllm-vision
    restart: unless-stopped
    ports:
      - "11435:8000"
    volumes:
      - vllm_vision_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HUB_OFFLINE=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - OMP_NUM_THREADS=1
    command: >
      --model Qwen/Qwen2.5-VL-3B-Instruct-AWQ
      --max-model-len 2048
      --gpu-memory-utilization 0.9
      --dtype float16
      --quantization awq
      --trust-remote-code
      --enforce-eager
      --limit-mm-per-prompt '{"image":1}'
      --mm-processor-kwargs '{"max_pixels": 1048576}'
      --attention-backend TRITON_ATTN
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s

  # ─────────────────────────────────────────
  # OPEN WEBUI — interfaz chat familiar
  # Puerto 3001 (3000 es el backend)
  # ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama-chat:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_MODELS=qwen2.5:7b
      - ENABLE_IMAGE_GENERATION=false
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
    depends_on:
      ollama-chat:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MODEL LOADER — precarga modelos ollama
  # ─────────────────────────────────────────
  model-loader:
    image: alpine:latest
    container_name: model-loader
    restart: "no"
    depends_on:
      ollama-chat:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        echo "=== Esperando ollama-chat ==="
        until curl -sf http://ollama-chat:11434/api/tags > /dev/null; do
          echo "  ... esperando ollama-chat"; sleep 5
        done
        echo "✓ ollama-chat responde"
        echo "=== Descargando qwen2.5:7b ==="
        curl -sf -X POST http://ollama-chat:11434/api/pull \
          -H "Content-Type: application/json" \
          -d '{"name":"qwen2.5:7b","stream":false}'
        echo "✓ qwen2.5:7b listo"
        curl -sf -X POST http://ollama-chat:11434/api/generate \
          -H "Content-Type: application/json" \
          -d '{"model":"qwen2.5:7b","prompt":"hola","stream":false,"keep_alive":-1}' > /dev/null
        echo "✓ qwen2.5:7b cargado en GPU 0"

  # ─────────────────────────────────────────
  # OCR SERVICE — Python 3.11 + FastAPI
  # Procesa fotos de listas manuscritas via vLLM
  # ─────────────────────────────────────────
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
      - VLLM_URL=${VLLM_URL}
      - VISION_MODEL=${VISION_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      vllm-vision:
        condition: service_healthy

  # ─────────────────────────────────────────
  # EXCEL-SERVICE — Go
  # Export de reportes a la plantilla .xlsx + import de nómina (en progreso)
  # ─────────────────────────────────────────
  excel-service:
    build:
      context: ./excel-service
      dockerfile: Dockerfile
    container_name: excel-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./agente-ocr/plantilla_asistencia.xlsx:/app/plantilla_asistencia.xlsx:ro
      - excel_output:/app/output
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # BACKEND — Node.js 22 + Express 5 + TypeScript
  # API REST principal
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - avatars_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - OCR_SERVICE_URL=http://ocr-service:8001
      - EXCEL_SERVICE_URL=http://excel-service:8002
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # FRONTEND — Angular 22 + PWA servido por Nginx
  # Proxy: /api/* → backend (incluye /api/ocr/* → backend → ocr-service)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tailscale_data:
  ollama_chat_data:
  vllm_vision_data:
  webui_data:
  postgres_data:
  excel_output:
  avatars_data:

networks:
  default:
    name: ai-stack
