services:

  # ─────────────────────────────────────────
  # TAILSCALE — acceso remoto seguro
  # ─────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: ai-rig
    network_mode: host
    privileged: true
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true

  # ─────────────────────────────────────────
  # POSTGRESQL — base de datos principal
  # NOTA: Si ya existe volumen postgres_data de instalación anterior,
  # ejecutar: docker volume rm ai-personal_postgres_data
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./postgres/02_auth_schema.sql:/docker-entrypoint-initdb.d/02_auth_schema.sql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ─────────────────────────────────────────
  # OLLAMA-CHAT — GPU 0 — chat familiar
  # ─────────────────────────────────────────
  ollama-chat:
    image: ollama/ollama:latest
    container_name: ollama-chat
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_chat_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  # ─────────────────────────────────────────
  # VLLM-VISION — GPU 1 + GPU 2
  # tensor parallelism entre ambas GPUs
  # ─────────────────────────────────────────
  vllm-vision:
    image: vllm/vllm-openai:latest
    container_name: vllm-vision
    restart: unless-stopped
    ports:
      - "11435:8000"
    volumes:
      - vllm_vision_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1", "2"]
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - HF_HUB_OFFLINE=1
    command: >
      --model Qwen/Qwen2.5-VL-7B-Instruct
      --tensor-parallel-size 2
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --dtype float16
      --trust-remote-code
      --enforce-eager
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s

  # ─────────────────────────────────────────
  # OPEN WEBUI — interfaz chat familiar
  # Puerto 3001 (3000 es el backend)
  # ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama-chat:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_MODELS=qwen2.5:7b
      - ENABLE_IMAGE_GENERATION=false
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
    depends_on:
      ollama-chat:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MODEL LOADER — precarga modelos ollama
  # ─────────────────────────────────────────
  model-loader:
    image: alpine:latest
    container_name: model-loader
    restart: "no"
    depends_on:
      ollama-chat:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        echo "=== Esperando ollama-chat ==="
        until curl -sf http://ollama-chat:11434/api/tags > /dev/null; do
          echo "  ... esperando ollama-chat"; sleep 5
        done
        echo "✓ ollama-chat responde"
        echo "=== Descargando qwen2.5:7b ==="
        curl -sf -X POST http://ollama-chat:11434/api/pull \
          -H "Content-Type: application/json" \
          -d '{"name":"qwen2.5:7b","stream":false}'
        echo "✓ qwen2.5:7b listo"
        curl -sf -X POST http://ollama-chat:11434/api/generate \
          -H "Content-Type: application/json" \
          -d '{"model":"qwen2.5:7b","prompt":"hola","stream":false,"keep_alive":-1}' > /dev/null
        echo "✓ qwen2.5:7b cargado en GPU 0"

  # ─────────────────────────────────────────
  # OCR SERVICE — Python 3.11 + FastAPI
  # Procesa fotos de listas manuscritas via vLLM
  # ─────────────────────────────────────────
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./agente-ocr/plantilla_asistencia.xlsx:/app/plantilla_asistencia.xlsx:ro
      - ocr_output:/app/output
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VLLM_URL=${VLLM_URL}
      - VISION_MODEL=${VISION_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      vllm-vision:
        condition: service_healthy

  # ─────────────────────────────────────────
  # BACKEND — Node.js 22 + Express 5 + TypeScript
  # API REST principal
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - OCR_SERVICE_URL=http://ocr-service:8001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # FRONTEND — Angular 22 + PWA servido por Nginx
  # Proxy: /api/* → backend, /ocr/* → ocr-service
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tailscale_data:
  ollama_chat_data:
  vllm_vision_data:
  webui_data:
  postgres_data:
  ocr_output:

networks:
  default:
    name: ai-stack
